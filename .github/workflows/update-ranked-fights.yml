name: Update ranked fights

on:
  workflow_dispatch:
  schedule:
    - cron: "17 8 * * *"

permissions:
  contents: write

jobs:
  update-ranked-fights:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/update-ranked-fights.mjs
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update ranked fight data"
